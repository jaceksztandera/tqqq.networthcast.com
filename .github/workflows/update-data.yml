name: Update market data

on:
  schedule:
    # GitHub cron is fixed UTC (no daylight-saving), so each entry drifts an
    # hour between EST and EDT — both times below stay safely inside their
    # intended window either way.
    #
    # Morning run — early intraday snapshot, ~1-2h after the 9:30 AM ET open:
    #   15:30 UTC = 10:30 AM ET (EST) / 11:30 AM ET (EDT)
    - cron: '30 15 * * 1-5'
    # Evening run — captures the (near-)final close, ~1-2h after the 4:00 PM
    #   ET close: 22:00 UTC = 5:00 PM ET (EST) / 6:00 PM ET (EDT)
    - cron: '0 22 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yfinance
        run: pip install yfinance

      - name: Refresh QQQ / TQQQ / SPY
        run: python3 update_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- 'data/*.tsv'; then
            echo "No data changes."
            exit 0
          fi
          git add 'data/*.tsv'
          git commit -m "Refresh market data $(date -u +%Y-%m-%d)"
          git push
